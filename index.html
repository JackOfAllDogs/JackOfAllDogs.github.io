<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jack of all dogs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Georgia", serif; /**/
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            background: url('img.png') no-repeat center center/cover;
            color: white;
            padding: 20px;
            position: relative;
        }

        body::before { /* Darker for readability */
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        .logo {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            z-index: 2;
        }

        .coming-soon {
            position: relative;
            z-index: 2;
        }

        .coming-soon h1 {
            font-size: 3rem;
            font-weight: normal;
        }

        @media (max-width: 768px) {
            .coming-soon h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="logo" id="site-name"></div>
    <div class="coming-soon">
        <h1>Coming Soon</h1>
    </div>

    <script>
        document.getElementById("site-name").textContent = document.title;
    </script>
</body>

</html>
